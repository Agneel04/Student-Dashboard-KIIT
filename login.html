<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>KIIT Login Page</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body {
    min-height: 100vh;
    background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Segoe UI', sans-serif;
}
.auth-card {
    background: rgba(255,255,255,0.12);
    backdrop-filter: blur(12px);
    border-radius: 18px;
    padding: 35px;
    width: 100%;
    max-width: 430px;
    color: white;
}
.btn-custom {
    background: linear-gradient(135deg, #00c6ff, #0072ff);
    border: none;
    border-radius: 12px;
    color: white;
}
</style>
</head>

<body>

<div class="auth-card">
<h3 class="text-center">KIIT Login Page</h3>

{% with messages = get_flashed_messages(with_categories=true) %}
{% for category, message in messages %}
<div class="alert alert-{{ category }}">{{ message }}</div>
{% endfor %}
{% endwith %}

<ul class="nav nav-pills mb-3 justify-content-center">
<li class="nav-item">
<button class="nav-link active" data-bs-toggle="pill" data-bs-target="#login">Login</button>
</li>
<li class="nav-item">
<button class="nav-link" data-bs-toggle="pill" data-bs-target="#signup">Signup</button>
</li>
</ul>

<div class="tab-content">
<div class="tab-pane fade show active" id="login">
<form action="/login" method="post">
<input class="form-control mb-2" name="username" placeholder="Username" required>
<input class="form-control mb-2" name="password" type="password" placeholder="Password" required>
<button class="btn btn-custom w-100">Login</button>
</form>
</div>

<div class="tab-pane fade" id="signup">
<form action="/signup" method="post">
<input class="form-control mb-2" name="username" placeholder="Username" required>
<input class="form-control mb-2" name="email" placeholder="Email" required>
<input class="form-control mb-2" name="password" type="password" placeholder="Password" required>
<button class="btn btn-custom w-100">Create Account</button>
</form>
</div>
</div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
